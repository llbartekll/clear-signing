name: Release Crate (crates.io)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match crates/clear-signing/Cargo.toml, e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/crate-$VERSION" >/dev/null 2>&1; then
            echo "Tag crate-$VERSION already exists on origin. Refusing to overwrite an existing release." >&2
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Assert Cargo.toml version matches input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          MANIFEST_VERSION=$(grep -E '^version = ' crates/clear-signing/Cargo.toml | head -n 1 | sed -E 's/version = "([^"]+)"/\1/')
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "crates/clear-signing/Cargo.toml version ($MANIFEST_VERSION) does not match release input ($VERSION)." >&2
            echo "Bump Cargo.toml and merge to main before triggering this workflow." >&2
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p clear-signing --all-features

      - name: Tag release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "crate-$VERSION"
          git push origin "crate-$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: crate-${{ inputs.version }}
          name: clear-signing ${{ inputs.version }} (crates.io)
          body: |
            Published to crates.io: https://crates.io/crates/clear-signing/${{ inputs.version }}

            Install: `cargo add clear-signing@${{ inputs.version }}`
          generate_release_notes: true
