name: Release All Platforms

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to ship across cargo + Swift + Kotlin + React Native (strict semver, e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-all-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version (strict semver)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$VERSION' — must match ^[0-9]+\\.[0-9]+\\.[0-9]+\$" >&2
            exit 1
          fi

  cargo:
    needs: validate
    uses: ./.github/workflows/release-crate.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  swift:
    needs: validate
    uses: ./.github/workflows/release-swift.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  kotlin:
    needs: swift
    uses: ./.github/workflows/release-kotlin.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  rn:
    needs: swift
    uses: ./.github/workflows/release-react-native.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit
