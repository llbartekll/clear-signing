name: Release Swift (iOS)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists on origin. Refusing to overwrite an existing release." >&2
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build XCFramework
        run: ./scripts/build-xcframework.sh

      - name: Zip XCFramework
        run: |
          mkdir -p Output
          cd target/ios
          zip -r ../../Output/libclear_signing.xcframework.zip libclear_signing.xcframework

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum Output/libclear_signing.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update Package.swift for release
        env:
          VERSION: ${{ inputs.version }}
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          # main keeps `useLocalRustXCFramework = true` for the local dev workflow;
          # the release tag needs `false` so SPM consumers pull the published zip.
          perl -0pi -e 's/private let useLocalRustXCFramework\s*=\s*true/private let useLocalRustXCFramework = false/' Package.swift
          perl -0pi -e 's#/download/[^/\"]*/libclear_signing#/download/$ENV{VERSION}/libclear_signing#g' Package.swift
          perl -0pi -e 's/checksum:\s*\"[^\"]*\"/checksum: \"$ENV{CHECKSUM}\"/g' Package.swift

          MANIFEST_JSON=$(mktemp)
          swift package dump-package > "$MANIFEST_JSON"

          ruby -rjson -e '
            manifest = JSON.parse(File.read(ARGV.fetch(0)))
            target = manifest.fetch("targets").find { |entry| entry["name"] == "ClearSigningRust" } or abort("missing ClearSigningRust target in dump-package output")
            abort("release manifest still points at a local path") if target.key?("path") && !target["path"].nil?

            expected_url = "https://github.com/llbartekll/clear-signing/releases/download/#{ENV.fetch("VERSION")}/libclear_signing.xcframework.zip"
            abort("release manifest URL mismatch: #{target["url"].inspect}") unless target["url"] == expected_url
            abort("release manifest checksum mismatch: #{target["checksum"].inspect}") unless target["checksum"] == ENV.fetch("CHECKSUM")
          ' "$MANIFEST_JSON"

          echo "Updated Package.swift:"
          grep 'useLocalRustXCFramework' Package.swift
          grep -A1 'url:' Package.swift
          grep 'checksum:' Package.swift

      - name: Tag release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Release $VERSION"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: Output/libclear_signing.xcframework.zip
